<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coming... | CrescitaZero</title>
  <meta name="description" content="Primo articolo test dell'archivio CrescitaZero.">

  <style>
    :root {
      --bg: #fbfaf6;
      --text: #111111;
      --muted: #5f5f5a;
      --line: #dedbd2;
      --accent: #2457ff;
      --max: 760px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    body {
      margin: 0;
      background:
        linear-gradient(to right, rgba(17,17,17,0.03) 1px, transparent 1px),
        var(--bg);
      background-size: 88px 88px;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:hover {
      color: var(--accent);
    }

    .page {
      width: min(100% - 32px, var(--max));
      margin: 0 auto;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(251,250,246,0.92);
      backdrop-filter: blur(10px);
    }

    .topbar {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 850;
      letter-spacing: -0.04em;
      font-size: 1.05rem;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      border: 2px solid var(--text);
      display: grid;
      place-items: center;
      font-size: 0.78rem;
      line-height: 1;
      letter-spacing: -0.06em;
    }

    nav {
      display: flex;
      gap: 18px;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 650;
    }

    main {
      padding: 64px 0;
    }

    .meta {
      margin: 0 0 18px;
      color: var(--accent);
      font-size: 0.88rem;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 12vw, 6rem);
      line-height: 0.98;
      letter-spacing: -0.075em;
      font-weight: 850;
    }

    .lead {
      margin: 30px 0 0;
      color: var(--muted);
      font-size: clamp(1.15rem, 3vw, 1.45rem);
      line-height: 1.5;
    }

    article {
      padding-bottom: 56px;
      border-bottom: 1px solid var(--line);
    }

    footer {
      padding: 36px 0 52px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 520px) {
      body {
        background-size: 58px 58px;
      }

      .page {
        width: min(100% - 24px, var(--max));
      }

      .topbar {
        min-height: auto;
        padding: 18px 0;
        align-items: flex-start;
        flex-direction: column;
        gap: 14px;
      }

      main {
        padding: 48px 0;
      }

      h1 {
        font-size: clamp(2.7rem, 15vw, 4.2rem);
        letter-spacing: -0.06em;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="page topbar">
      <a class="brand" href="/">
        <span class="brand-mark">CZ</span>
        <span>CrescitaZero</span>
      </a>

      <nav aria-label="Navigazione principale">
        <a href="/">Home</a>
        <a href="/#articoli">Articoli</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <article>
      <p class="meta">Articolo test</p>
      <h1>Coming...</h1>

      <p class="lead">
        Questo è un articolo di prova. Qui compariranno gli articoli dell’archivio di CrescitaZero.
      </p>
    </article>
  </main>

  <footer class="page">
    <p>© 2026 CrescitaZero</p>
  </footer>
</body>
</html>
